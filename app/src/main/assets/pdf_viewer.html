<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hybrid Text Overlay</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: transparent !important;
      overflow: hidden;
      -webkit-user-select: text;
      user-select: text;
    }
    
    #container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* Container itself shouldn't block touch */
    }

    .page-container {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: 0 0;
      background: transparent !important;
      pointer-events: auto; /* Let textLayer spans capture touches */
      overflow: visible;
    }

    .textLayer {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      opacity: 0.35; /* Semi-transparent selection highlight overlay */
      mix-blend-mode: multiply;
      line-height: 1.0;
      -webkit-user-select: text;
      user-select: text;
    }

    .textLayer span {
      color: transparent !important;
      position: absolute;
      white-space: pre;
      cursor: text;
      transform-origin: 0% 0%;
    }
    
    /* Native Selection highlights custom styles for visual appeal */
    ::selection {
      background: rgba(33, 150, 243, 0.3) !important;
    }
  </style>
</head>
<body>
  <div id="container"></div>

  <!-- Load modular helper JS -->
  <script type="module" src="https://localpdf/helper_main.js"></script>
</body>
</html>
